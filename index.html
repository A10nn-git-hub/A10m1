<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Игровой Центр</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1e1e1e; --text: #ffffff; --btn: #3390ec; --btn-text: #ffffff; --sidebar-bg: #111111; --panel-bg: #222224; --nav-w: 80px; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; user-select: none; width: 100vw; height: 100vh; }
        #rotate-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @media screen and (orientation: portrait) { #rotate-overlay { display: flex; } #app-container { display: none !important; } }
        .glass { background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; color: white; transition: 0.3s; }
        .overlay.hidden { display: none !important; }
        .btn { padding: 12px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; background: var(--btn); color: var(--btn-text); cursor: pointer; transition: 0.1s; margin: 5px; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-red { background-color: #ff453a; color: white; }
        .btn-green { background-color: #34c759; color: white; }
        .btn-dark { background-color: #333; color: white; }
        .btn-gold { background-color: #ff9f0a; color: white; }
        #app-container { display: flex; width: 100vw; height: 100vh; position: relative; }
        .nav-bar { width: var(--nav-w); background: var(--sidebar-bg); border-right: 2px solid #2a2a2a; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; z-index: 50; overflow-y: auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; opacity: 0.5; transition: 0.2s; width: 100%; padding: 10px 0; }
        .nav-item.active { opacity: 1; filter: drop-shadow(0 0 8px #3390ec); color: #3390ec; background: rgba(51, 144, 236, 0.1); border-left: 3px solid #3390ec; }
        .nav-icon { font-size: 26px; margin-bottom: 5px; }
        .nav-text { font-size: 9px; font-weight: bold; text-transform: uppercase; text-align: center; }
        .main-content { flex-grow: 1; position: relative; background: var(--bg); overflow: hidden; }
        .tab-view { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; }
        .tab-view.active { display: flex; }
        .sub-tabs-header { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; width: 100%; }
        .sub-tab-btn { background: #333; color: gray; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; }
        .sub-tab-btn.active { background: #3390ec; color: white; }
        .sub-tab-content { display: none; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; }
        .sub-tab-content.active { display: flex; }
        #tab-profile { flex-direction: column; align-items: center; justify-content: center; }
        .profile-mega-box { background: var(--panel-bg); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #444; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profile-avatar { font-size: 80px; margin-bottom: 10px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); cursor: pointer; transition: 0.2s; display: inline-block; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .profile-avatar:active { transform: scale(0.9); }
        .profile-name { font-size: 32px; font-weight: 900; margin-bottom: 5px; cursor: pointer; border-bottom: 2px dashed transparent; display: inline-block; }
        .profile-name:hover { border-bottom: 2px dashed #888; }
        .profile-id { font-size: 18px; color: #888; font-family: monospace; background: #111; padding: 5px 15px; border-radius: 10px; display: inline-block; margin-bottom: 20px; cursor: pointer; border: 1px solid transparent; }
        .profile-id:active { border-color: #ff453a; }
        .profile-coins { font-size: 24px; color: #ff9f0a; font-weight: bold; background: rgba(255,159,10,0.1); padding: 10px 20px; border-radius: 15px; border: 1px solid #ff9f0a; display: inline-block; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 10px; }
        .emoji-item { font-size: 40px; cursor: pointer; padding: 5px; background: #333; border-radius: 10px; transition: 0.1s; }
        .emoji-item:active { transform: scale(0.8); background: #ff9f0a; }
        #tab-friends { flex-direction: row; gap: 20px; padding: 20px; }
        .friends-list-panel { width: 300px; background: var(--panel-bg); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; }
        .friend-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border-left: 3px solid transparent; }
        .friend-item:active { background: #333; border-color: #3390ec; }
        .friend-name { font-weight: bold; font-size: 16px; }
        .friend-id { font-size: 12px; color: gray; font-family: monospace; }
        .lobby-buttons-panel { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; position: relative; }
        .mega-btn { width: 80%; max-width: 400px; padding: 30px; border-radius: 20px; font-size: 24px; font-weight: 900; color: white; border: none; cursor: pointer; text-transform: uppercase; transition: 0.1s; box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
        .mega-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .mega-create { background: linear-gradient(45deg, #ff9f0a, #ff453a); }
        .mega-custom { background: linear-gradient(45deg, #32ade6, #3390ec); opacity: 0.8; }
        #view-lobby { display: none; flex-direction: column; flex-grow: 1; position: relative; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .lobby-slots-container { display: flex; gap: 20px; justify-content: center; align-items: center; width: 100%; flex-wrap: wrap; padding: 20px; box-sizing: border-box; }
        .square-slot { width: 18vh; height: 18vh; background: var(--panel-bg); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #444; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; transition: 0.2s; }
        .square-slot.active-slot { border-color: #ff9f0a; }
        .slot-avatar { font-size: 6vh; margin-bottom: 1vh; }
        .slot-name { font-weight: bold; font-size: 2vh; text-align: center; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .slot-status { font-size: 1.4vh; color: #34c759; position: absolute; bottom: -24px; font-weight: bold; }
        .lobby-controls-bottom-right { position: absolute; bottom: 0; right: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .mode-text { font-size: 16px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: -5px; }
        .play-btn { background: #34c759; color: white; border: none; border-radius: 12px; padding: 15px 50px; font-size: 26px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 0 #248a3d; transition: 0.1s; }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #248a3d; }
        #game-container { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; }
        .game-screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .game-screen.active { display: flex; }
        #dynamic-island { color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 14px; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1100; display: none; pointer-events: none;}
        #pause-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 25px; border: 2px solid white; font-size: 20px; color: white; display: none; align-items: center; justify-content: center; z-index: 1100; cursor: pointer; background: rgba(0,0,0,0.5); box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.1s;}
        #pause-btn:active { transform: scale(0.9); }
        .math-menu-grid { display: flex; gap: 20px; }
        .math-mode-card { background: var(--panel-bg); border: 3px solid #3390ec; border-radius: 20px; padding: 20px; width: 200px; text-align: center; cursor: pointer; box-shadow: 0 10px 0 #1c6ab3; transition: 0.1s; }
        .math-mode-card:active { transform: translateY(10px); box-shadow: 0 0 0 #1c6ab3; }
        .math-mode-icon { font-size: 60px; margin-bottom: 10px; }
        .math-mode-title { font-size: 20px; font-weight: bold; color: #fff; }
        .math-progress-container { display: flex; gap: 10px; justify-content: center; width: 100%; margin-bottom: 3vh; height: 2vh; align-items: center; }
        .math-dot { width: 2vh; height: 2vh; background: #444; border-radius: 50%; transition: 0.3s ease; }
        .math-dot.active-dot { width: 6vh; border-radius: 1vh; background: #3390ec; }
        .math-dot.done-dot { background: #34c759; }
        .math-equation { font-size: 10vh; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; gap: 20px; }
        .math-input-box { width: 10vh; height: 10vh; background: #333; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #ff9f0a; border: 4px dashed #666; }
        .math-numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .math-num-btn { font-size: 4vh; font-weight: bold; padding: 15px 30px; border-radius: 15px; background: #3390ec; color: white; border: none; box-shadow: 0 5px 0 #1c6ab3; cursor: pointer; }
        .math-num-btn:active { transform: translateY(5px); box-shadow: none; }
        .math-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .math-ans-card { font-size: 8vh; font-weight: 900; background: #ff9f0a; border-radius: 20px; width: 25vh; height: 12vh; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 0 #c27602; border: none; color: white; }
        .math-ans-card:active { transform: translateY(8px); box-shadow: none; }
        .math-sort-slots { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .math-slot { width: 8vh; height: 8vh; border: 3px dashed #666; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4vh; font-weight: bold; background: #222; }
        .math-sort-items { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .math-drag-item { width: 8vh; height: 8vh; background: #34c759; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4vh; font-weight: bold; box-shadow: 0 5px 0 #248a3d; cursor: pointer; }
        .math-drag-item:active { transform: scale(0.9); }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 45vh; height: 45vh; margin: 0 auto; box-sizing: border-box; }
        .cell { background: #2c2c2e; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 10vh; font-weight: bold; cursor: pointer; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3); box-sizing: border-box; overflow: hidden; line-height: 1; width: 100%; height: 100%; margin: 0; padding: 0; }
        .cell.x { color: #ff453a; text-shadow: 0 4px 0 #8b0000; }
        .cell.o { color: #32ade6; text-shadow: 0 4px 0 #005f8b; }
        .hidden-scene { position: relative; width: 90%; height: 75vh; background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #8FBC8F 50%, #8FBC8F 100%); border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .hidden-item, .scene-decor { position: absolute; font-size: 5vh; transform: translate(-50%, -50%); }
        .hidden-item { cursor: pointer; z-index: 10; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); transition: transform 0.1s; }
        .clicker-setup { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 0 0 20px 0; }
        .round-btn { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 24px; font-weight: bold; background: var(--btn); color: white; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .giant-click-btn { width: 50vw; height: 50vh; border-radius: 20px; font-size: 10vh; font-weight: 900; background: #ff9f0a; color: white; border: none; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.2); cursor: pointer; }
        .giant-click-btn:active { transform: scale(0.98); background: #e08e09; }
        .styled-input { padding: 15px; border-radius: 10px; border: 2px solid #444; background: #111; color: white; font-size: 18px; width: 80%; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<script>
        const tg = window.Telegram.WebApp;
        try { tg.expand(); if (tg.requestFullscreen) tg.requestFullscreen(); } catch(e) {}
        tg.ready();

        const FAKE_DB_IDS = ['1111', '2222', '3333', '4444', '5555'];
        const EMOJIS = ['😎','👾','👽','👻','💩','🐵','🦊','🐯','🦁','🐸','🦖','🐉','🐳','🦄','🦇','🦉','🦚','🦜','🦩','🦀','🐙','🦋','🐛','🐝','🐞','🐌','🦕','🦈','🐊','🐅','🐆','🦓','🦍','🦧','🦣','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🐃','🐂','🐄','🐎','🐖','🐏','🐑','🦙','🐐','🦌','🐕','🐩','🦮','🐕‍🦺','🐈','🐈‍⬛','🤡','👿'];

        let globalCoins = 0;
        let myName = tg.initDataUnsafe?.user?.first_name || "Игрок";
        let myAvatar = "😎";
        let myId = "0000";
        const SYSTEM_BOT = { id: 'БОТ', name: 'ИИ', avatar: '🤖' };
        let friends = [];
        let activeFriend = null; 
        
        let appState = { game: null, isPaused: false, inLobby: false, lobbyMode: 'solo', selectedGameId: null, selectedGameName: "Не выбран" };
        let lobbyPlayers = []; 

        // ИНИЦИАЛИЗАЦИЯ
        tg.CloudStorage.getKeys((err, keys) => {
            if(err) return;
            tg.CloudStorage.getItems(keys, (err, values) => {
                if(!err) {
                    globalCoins = parseInt(values['player_coins']) || 0;
                    updateCoinsUI();
                    
                    if(values['my_id']) myId = values['my_id'];
                    else { myId = Math.floor(1000 + Math.random() * 9000).toString(); tg.CloudStorage.setItem('my_id', myId); }
                    
                    if(values['my_name']) myName = values['my_name'];
                    if(values['my_avatar']) myAvatar = values['my_avatar'];
                    
                    checkAdminAccess();

                    if(values['friends']) { try { friends = JSON.parse(values['friends']); } catch(e){} }
                    if(!friends.some(f => f.id === 'БОТ')) { friends.unshift(SYSTEM_BOT); saveFriends(); } 
                    else { renderFriends(); }

                    if(!localStorage.getItem('promos')) localStorage.setItem('promos', JSON.stringify({}));
                    if(!localStorage.getItem('used_promos')) localStorage.setItem('used_promos', JSON.stringify([]));
                }
            });
        });

        function checkAdminAccess() {
            if (myId === '8451') {
                document.getElementById('my-id-display').innerText = "ID: DEVELOPER";
                document.getElementById('my-id-display').style.color = "#ff453a";
                document.getElementById('nav-admin').style.display = 'flex';
            } else {
                document.getElementById('my-id-display').innerText = `ID: ${myId}`;
                document.getElementById('my-id-display').style.color = "#888";
                document.getElementById('nav-admin').style.display = 'none';
            }
            document.getElementById('my-name').innerHTML = `${myName} ✏️`;
            document.getElementById('lobby-my-name').innerText = myName;
            document.getElementById('my-avatar').innerText = myAvatar;
        }

        function tryAdminLogin() {
            if (myId === '8451') return;
            let pw = prompt("Введите пароль разработчика:");
            if (pw === "8451") {
                myId = "8451"; tg.CloudStorage.setItem('my_id', myId);
                checkAdminAccess(); tg.HapticFeedback.notificationOccurred('success'); tg.showAlert("Доступ разработчика получен! 🛠️");
            } else if(pw) tg.HapticFeedback.notificationOccurred('error');
        }

        function changeName() {
            let newName = prompt("Введи новый ник:", myName);
            if(newName && newName.trim().length > 0 && newName.trim().length <= 12) {
                myName = newName.trim(); tg.CloudStorage.setItem('my_name', myName);
                checkAdminAccess(); tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function openAvatarModal() {
            const grid = document.getElementById('emoji-grid'); grid.innerHTML = '';
            EMOJIS.forEach(em => {
                let div = document.createElement('div'); div.className = 'emoji-item'; div.innerText = em;
                div.onclick = () => {
                    myAvatar = em; tg.CloudStorage.setItem('my_avatar', myAvatar);
                    checkAdminAccess(); closeAvatarModal(); tg.HapticFeedback.impactOccurred('light');
                    if(appState.inLobby && lobbyPlayers.length > 0) { lobbyPlayers[0].avatar = myAvatar; renderLobbySlots(); }
                };
                grid.appendChild(div);
            });
            document.getElementById('avatar-modal').classList.remove('hidden');
        }
        function closeAvatarModal() { document.getElementById('avatar-modal').classList.add('hidden'); }

        function saveFriends() { tg.CloudStorage.setItem('friends', JSON.stringify(friends)); renderFriends(); }
        function updateCoinsUI() { document.getElementById('menu-coins').innerText = globalCoins; document.getElementById('hidden-coins').innerText = globalCoins; }
        function addCoins(amount) { globalCoins = Math.max(0, globalCoins + amount); updateCoinsUI(); tg.CloudStorage.setItem('player_coins', globalCoins.toString()); }

        function switchTab(tabId, el) {
            if(appState.inLobby) return;
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active')); el.classList.add('active');
            document.querySelectorAll('.tab-view').forEach(tab => tab.classList.remove('active')); document.getElementById('tab-' + tabId).classList.add('active');
        }
        function switchSubTab(parent, subId, el) {
            el.parentElement.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active')); el.classList.add('active');
            document.querySelectorAll(`#tab-${parent} .sub-tab-content`).forEach(c => c.classList.remove('active')); document.getElementById(`${parent === 'weapons' ? 'weap' : 'adm'}-${subId}`).classList.add('active');
        }

        function adminCreatePromo() {
            let code = document.getElementById('adm-promo-code').value.trim().toUpperCase();
            let coins = parseInt(document.getElementById('adm-promo-coins').value);
            if(!code || isNaN(coins) || coins <= 0) { tg.showAlert("Заполни правильно!"); return; }
            let promos = JSON.parse(localStorage.getItem('promos'));
            promos[code] = coins; localStorage.setItem('promos', JSON.stringify(promos));
            tg.showAlert(`Промокод ${code} на ${coins} монет создан!`);
            document.getElementById('adm-promo-code').value = ''; document.getElementById('adm-promo-coins').value = '';
        }

        function redeemPromo() {
            let code = document.getElementById('promo-input').value.trim().toUpperCase();
            if(!code) return;
            let promos = JSON.parse(localStorage.getItem('promos')); let used = JSON.parse(localStorage.getItem('used_promos'));
            if(used.includes(code)) { tg.showAlert("Ты уже использовал этот код!"); return; }
            if(promos[code]) {
                addCoins(promos[code]); used.push(code); localStorage.setItem('used_promos', JSON.stringify(used));
                tg.showAlert(`Успех! +${promos[code]} 🪙`); document.getElementById('promo-input').value = ''; tg.HapticFeedback.notificationOccurred('success');
            } else { tg.HapticFeedback.notificationOccurred('error'); tg.showAlert("Неверный код!"); }
        }

        function renderFriends() {
            const list = document.getElementById('friends-list'); list.innerHTML = '';
            friends.forEach((f) => {
                let div = document.createElement('div'); div.className = 'friend-item'; let icon = f.avatar || '👤';
                div.innerHTML = `<div><div class="friend-name">${icon} ${f.name}</div><div class="friend-id">ID: ${f.id}</div></div><div>⋮</div>`;
                div.onclick = () => openFriendModal(f); list.appendChild(div);
            });
        }

        function addFriendBtn() {
            let idInput = prompt("Введи 4-значный ID друга:");
            if (idInput && idInput.length === 4) {
                if (idInput === myId) { tg.showAlert("Это твой ID!"); return; }
                if (friends.some(f => f.id === idInput)) { tg.showAlert("Друг уже в списке!"); return; }
                if (!FAKE_DB_IDS.includes(idInput)) { tg.showAlert(`Ошибка: Игрок не найден!`); return; }
                friends.push({ id: idInput, name: `Боец ${idInput}`, avatar: '👤' }); saveFriends(); tg.showAlert(`Добавлен!`);
            }
        }

        function openFriendModal(friend) {
            activeFriend = friend;
            document.getElementById('fm-avatar').innerText = friend.avatar || '👤';
            document.getElementById('fm-name').innerText = friend.name;
            document.getElementById('fm-id').innerText = `ID: ${friend.id}`;
            const actions = document.getElementById('friend-actions'); actions.innerHTML = '';
            
            if (appState.inLobby) {
                actions.innerHTML += `<button class="btn btn-green" onclick="inviteFriendToLobby()">Пригласить в Лобби 🎮</button>`;
            } else {
                if (friend.id === 'БОТ') actions.innerHTML += `<button class="btn" style="background: #444; color: gray; cursor: not-allowed;">Создай лобби для ИИ</button>`;
                else actions.innerHTML += `<button class="btn btn-green" onclick="joinFriendLobby()">Присоединиться 🚀</button>`;
            }
            if (friend.id !== 'БОТ') actions.innerHTML += `<button class="btn btn-red" onclick="removeFriend()">Удалить 🗑️</button>`;
            actions.innerHTML += `<button class="btn" onclick="closeFriendModal()" style="background: #444; color: white;">Отмена</button>`;
            document.getElementById('friend-modal').classList.remove('hidden');
        }
        function closeFriendModal() { document.getElementById('friend-modal').classList.add('hidden'); }
        function removeFriend() { if(confirm(`Удалить ${activeFriend.name}?`)) { friends = friends.filter(f => f.id !== activeFriend.id); saveFriends(); closeFriendModal(); } }
