<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игровой Центр</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #1e1e1e);
            --text: var(--tg-theme-text-color, #ffffff);
            --btn: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; padding-top: 30px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box; overflow-x: hidden;
            user-select: none;
        }
        
        .glass {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .screen { display: none; width: 100%; max-width: 400px; text-align: center; padding-top: 50px; }
        .screen.active { display: block; }
        #screen-games, #screen-players, #screen-setup { padding-top: 20px; }
        
        h1, h2 { margin: 10px 0 20px 0; }
        .btn {
            width: 100%; padding: 15px; margin: 8px 0;
            font-size: 16px; font-weight: bold; border: none; border-radius: 12px;
            background: var(--btn); color: var(--btn-text);
            cursor: pointer; transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-red { background-color: #ff453a; color: white; }
        .btn-green { background-color: #34c759; color: white; }

        .header-coins {
            background: rgba(255, 159, 10, 0.2); border: 2px solid #ff9f0a;
            color: #ff9f0a; padding: 10px 20px; border-radius: 20px;
            font-size: 18px; font-weight: bold; display: inline-block; margin-bottom: 20px;
        }

        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .game-card { background: #2c2c2e; border-radius: 15px; padding: 15px; cursor: pointer; transition: transform 0.1s; }
        .game-card:active { transform: scale(0.95); }
        .game-img { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #444; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 10px; }

        .shop-btn {
            width: 100%; padding: 20px; font-size: 20px; font-weight: 900;
            border-radius: 50px; border: none; color: white;
            background: linear-gradient(45deg, #ff9f0a, #ff453a);
            box-shadow: 0 4px 15px rgba(255, 69, 58, 0.4);
            cursor: pointer; transition: 0.1s; text-transform: uppercase;
        }
        .shop-btn:active { transform: scale(0.95); }

        .player-setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: #2c2c2e; padding: 10px; border-radius: 10px; }
        .player-setup-row input { flex-grow: 1; padding: 10px; border: none; border-radius: 8px; margin-right: 10px; background: #1c1c1e; color: white; }
        .color-box { width: 35px; height: 35px; border-radius: 8px; cursor: pointer; border: 2px solid white; }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
        .cell { aspect-ratio: 1; background: #2c2c2e; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; cursor: pointer; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3); }
        .cell.x { color: #ff453a; text-shadow: 0 4px 0 #8b0000, 0 5px 10px rgba(0,0,0,0.5); }
        .cell.o { color: #32ade6; text-shadow: 0 4px 0 #005f8b, 0 5px 10px rgba(0,0,0,0.5); }

        #dynamic-island {
            color: white; padding: 10px 20px; border-radius: 30px;
            font-weight: bold; font-size: 14px; position: fixed; top: 15px; left: 50%;
            transform: translateX(-50%); z-index: 100; display: none;
            transition: 0.2s; white-space: nowrap;
        }

        #pause-btn {
            position: fixed; top: 15px; right: 15px; width: 45px; height: 45px;
            border-radius: 25px; border: 2px solid white; font-size: 20px;
            color: white; display: none; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; color: white; transition: 0.3s;
        }
        .overlay.hidden { display: none !important; }
        #result-emoji { font-size: 120px; margin-bottom: 20px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); }
        #result-text { font-size: 32px; font-weight: bold; margin-bottom: 40px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        
        .clicker-setup { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 0 0 20px 0; }
        .round-btn { width: 50px; height: 50px; border-radius: 25px; border: none; font-size: 20px; font-weight: bold; background: var(--btn); color: white; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .clicker-time-display { font-size: 24px; font-weight: bold; width: 80px; }
        .giant-click-btn { width: 100%; height: 350px; border-radius: 20px; font-size: 50px; font-weight: 900; background: #ff9f0a; color: white; border: none; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.2); cursor: pointer; transition: 0.05s; }
        .giant-click-btn:active { transform: scale(0.98); background: #e08e09; }

        /* Поиск предметов */
        .hidden-scene {
            position: relative; width: 100%; height: 450px; margin-top: 10px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #8FBC8F 50%, #8FBC8F 100%);
            border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            transition: background-color 0.1s;
        }
        .hidden-item, .scene-decor {
            position: absolute; font-size: 40px;
            transform: translate(-50%, -50%);
        }
        .hidden-item { cursor: pointer; z-index: 10; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); transition: transform 0.1s; }
        .hidden-item:active { transform: translate(-50%, -50%) scale(0.8); }
        .scene-decor { z-index: 5; opacity: 0.8; pointer-events: none; }
        .hidden-stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 10px; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="dynamic-island" class="glass"><span id="island-text">...</span></div>
    <div id="pause-btn" class="glass" onclick="togglePause(true)">⏸</div>

    <div id="pause-overlay" class="overlay glass hidden">
        <h2 style="font-size: 40px;">ПАУЗА ⏸️</h2>
        <div style="width: 80%; max-width: 300px; margin-top: 30px;">
            <button class="btn btn-green" onclick="togglePause(false)">ПРОДОЛЖИТЬ ✔️</button>
            <button class="btn btn-red" onclick="exitToMenu()">ВЫЙТИ В МЕНЮ 🚪</button>
        </div>
    </div>

    <div id="result-overlay" class="overlay hidden">
        <div id="result-emoji">🏆</div>
        <div id="result-text">Победа!</div>
        <button class="btn" style="width: 80%; background: rgba(0,0,0,0.3); border: 2px solid white;" onclick="closeResult()">В Главное Меню</button>
    </div>

    <div class="screen active" id="screen-games">
        <div class="header-coins">🪙 <span id="menu-coins">0</span></div>
        <h1>Во что играем? 🎮</h1>
        <div class="games-grid">
            <div class="game-card" onclick="selectGame('hidden')">
                <div class="game-img">🔎</div>
                <div>Поиск предметов</div>
            </div>
            <div class="game-card" onclick="selectGame('tictactoe')">
                <div class="game-img">❌⭕</div>
                <div>Крестики-нолики</div>
            </div>
            <div class="game-card" onclick="selectGame('clicker')">
                <div class="game-img">⏱️</div>
                <div>Кликер</div>
            </div>
        </div>
        
        <button class="shop-btn" onclick="showScreen('screen-shop')">МАГАЗИН 🛒</button>
    </div>

    <div class="screen" id="screen-shop">
        <h2 style="font-size: 30px;">МАГАЗИН 🛒</h2>
        <div class="header-coins" style="margin-top: 10px;">У тебя: <span id="shop-coins">0</span> 🪙</div>
        
        <div style="background: #2c2c2e; padding: 50px 20px; border-radius: 20px; margin: 20px 0; color: #888;">
            <div style="font-size: 50px; margin-bottom: 20px;">📦</div>
            <h3>Пока что пусто</h3>
            <p>Скоро здесь появятся крутые товары и скины!</p>
        </div>

        <button class="btn btn-red" onclick="showScreen('screen-games')">🔙 Назад</button>
    </div>

    <div class="screen" id="screen-players">
        <h2>Сколько игроков?</h2>
        <button class="btn" onclick="selectPlayers(1)" id="btn-p1">1 Игрок</button>
        <button class="btn" onclick="selectPlayers(2)" id="btn-p2">2 Игрока</button>
        <button class="btn" onclick="selectPlayers(3)" id="btn-p3">3 Игрока</button>
        <button class="btn" onclick="selectPlayers(4)" id="btn-p4">4 Игрока</button>
        <button class="btn btn-red" style="margin-top:20px" onclick="showScreen('screen-games')">🔙 Назад</button>
    </div>

    <div class="screen" id="screen-setup">
        <h2>ЛОББИ</h2>
        <div id="setup-rows"></div>
        <button class="btn btn-green" style="margin-top: 20px;" onclick="startGame()">▶️ СТАРТ!</button>
        <button class="btn btn-red" onclick="showScreen('screen-players')">🔙 Назад</button>
    </div>

    <div class="screen" id="screen-game-tictactoe">
        <div class="board" id="ttt-board"></div>
    </div>

    <div class="screen" id="screen-game-hidden">
        <div class="hidden-stats">
            <div>Найдено: <span id="hidden-found">0</span>/5</div>
            <div style="color: #ff9f0a;">🪙 <span id="hidden-coins">0</span></div>
        </div>
        <div class="hidden-scene" id="hidden-scene" onmousedown="missHiddenClick(event)" ontouchstart="missHiddenClick(event)">
            </div>
        <p style="color: gray; font-size: 14px; margin-top: 15px;">Тапай только по предметам! Промах отнимет монеты.</p>
    </div>

    <div class="screen" id="screen-game-clicker">
        <div class="clicker-setup" id="clicker-controls">
            <button class="round-btn" onclick="changeClickTime(-5)">◀</button>
            <div class="clicker-time-display" id="click-time-val">15 сек</div>
            <button class="round-btn" onclick="changeClickTime(5)">▶</button>
        </div>
        <h1 id="click-score" style="font-size: 60px; margin: 10px 0;">0</h1>
        <button class="giant-click-btn" id="click-btn" onclick="doClick()">ЖМИ!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();

        const COLORS = ['#ff453a', '#32ade6', '#34c759', '#ffd60a', '#bf5af2', '#ff9f0a'];
        let appState = { game: null, playerCount: 1, players: [], isPaused: false };
        
        let globalCoins = 0;

        // --- ЗАГРУЗКА И СОХРАНЕНИЕ МОНЕТОК ИЗ ОБЛАКА TELEGRAM ---
        // Как только приложение запускается, пытаемся достать монетки
        tg.CloudStorage.getItem('player_coins', (err, value) => {
            if (!err && value) {
                globalCoins = parseInt(value) || 0;
            } else {
                globalCoins = 0;
            }
            updateCoinUI();
        });

        function addCoins(amount) {
            globalCoins += amount;
            if (globalCoins < 0) globalCoins = 0; 
            updateCoinUI();
            
            // Сохраняем новый баланс в облако ТГ
            tg.CloudStorage.setItem('player_coins', globalCoins.toString());
        }

        function updateCoinUI() {
            document.getElementById('menu-coins').innerText = globalCoins;
            document.getElementById('shop-coins').innerText = globalCoins;
            document.getElementById('hidden-coins').innerText = globalCoins;
        }
        // --------------------------------------------------------

        function setIsland(text, borderColor = '#fff') {
            const island = document.getElementById('dynamic-island');
            document.getElementById('island-text').innerText = text;
            island.style.display = 'block';
            island.style.border = `2px solid ${borderColor}`;
        }
        function hideIsland() { document.getElementById('dynamic-island').style.display = 'none'; }
        function setPauseBtn(visible) { document.getElementById('pause-btn').style.display = visible ? 'flex' : 'none'; }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            hideIsland(); setPauseBtn(false); appState.isPaused = false;
        }

        function togglePause(pause) {
            appState.isPaused = pause;
            if (pause) {
                document.getElementById('pause-overlay').classList.remove('hidden');
                tg.HapticFeedback.impactOccurred('light');
            } else {
                document.getElementById('pause-overlay').classList.add('hidden');
            }
        }

        function exitToMenu() {
            togglePause(false);
            if(appState.game === 'clicker') clearInterval(clickInterval);
            showScreen('screen-games');
        }

        function showResult(text, bgColor, emoji) {
            hideIsland(); setPauseBtn(false);
            const overlay = document.getElementById('result-overlay');
            overlay.style.backgroundColor = bgColor;
            document.getElementById('result-text').innerText = text;
            document.getElementById('result-emoji').innerText = emoji;
            overlay.classList.remove('hidden');
            tg.HapticFeedback.notificationOccurred(emoji === '🤝' ? 'warning' : 'success');
        }
        function closeResult() { document.getElementById('result-overlay').classList.add('hidden'); showScreen('screen-games'); }

        function selectGame(game) {
            appState.game = game;
            ['p1','p2','p3','p4'].forEach(id => document.getElementById(`btn-${id}`).style.display = 'block');
            
            if (game === 'tictactoe') { appState.playerCount = 2; buildSetup(); }
            else if (game === 'clicker') { appState.playerCount = 1; buildSetup(); }
            else if (game === 'hidden') { appState.playerCount = 1; startGame(); } 
            else { showScreen('screen-players'); }
        }

        function selectPlayers(count) { appState.playerCount = count; buildSetup(); }

        function buildSetup() {
            const container = document.getElementById('setup-rows');
            container.innerHTML = ''; appState.players = [];

            for (let i = 0; i < appState.playerCount; i++) {
                appState.players.push({ name: `Игрок ${i+1}`, color: COLORS[i % COLORS.length], colorIdx: i % COLORS.length, score: 0 });
                const row = document.createElement('div'); row.className = 'player-setup-row';
                row.innerHTML = `<input type="text" value="Игрок ${i+1}" onchange="appState.players[${i}].name=this.value">
                                 <div class="color-box" id="p-color-${i}" style="background-color: ${COLORS[i % COLORS.length]}" onclick="cycleColor(${i})"></div>`;
                container.appendChild(row);
            }
            showScreen('screen-setup');
        }

        function cycleColor(idx) {
            let p = appState.players[idx]; let nextIdx = p.colorIdx; let inUse = true;
            while (inUse) {
                nextIdx = (nextIdx + 1) % COLORS.length;
                inUse = appState.players.some((other, oIdx) => oIdx !== idx && other.colorIdx === nextIdx);
            }
            p.colorIdx = nextIdx; p.color = COLORS[p.colorIdx];
            document.getElementById(`p-color-${idx}`).style.backgroundColor = p.color;
            tg.HapticFeedback.impactOccurred('light');
        }

        function startGame() {
            setPauseBtn(true);
            if (appState.game === 'tictactoe') { showScreen('screen-game-tictactoe'); initTicTacToe(); }
            else if (appState.game === 'hidden') { showScreen('screen-game-hidden'); initHiddenGame(); }
            else if (appState.game === 'clicker') { showScreen('screen-game-clicker'); initClicker(); }
        }

        // --- КРЕСТИКИ НОЛИКИ ---
        let tttBoard = [], tttTurn = 'x';
        function initTicTacToe() {
            tttBoard = ['', '', '', '', '', '', '', '', '']; tttTurn = 'x';
            setIsland('Ход: ❌', '#ff453a'); renderTicTacToe();
        }
        function renderTicTacToe() {
            const board = document.getElementById('ttt-board'); board.innerHTML = '';
            tttBoard.forEach((cell, i) => {
                const div = document.createElement('div'); div.className = `cell ${cell}`;
                div.innerText = cell === 'x' ? '❌' : (cell === 'o' ? '⭕' : '');
                div.onclick = () => moveTicTacToe(i); board.appendChild(div);
            });
        }
        function moveTicTacToe(i) {
            if (tttBoard[i] !== '' || appState.isPaused) return;
            tg.HapticFeedback.impactOccurred('medium'); tttBoard[i] = tttTurn; renderTicTacToe();
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            if (wins.some(c => tttBoard[c[0]] !== '' && tttBoard[c[0]] === tttBoard[c[1]] && tttBoard[c[1]] === tttBoard[c[2]])) {
                const color = tttTurn === 'x' ? '#ff453a' : '#32ade6';
                setTimeout(() => showResult(`ПОБЕДИЛ ${tttTurn === 'x' ? 'КРЕСТИК' : 'НОЛИК'}!`, color, tttTurn === 'x' ? '❌' : '⭕'), 300);
                return;
            }
            if (!tttBoard.includes('')) { setTimeout(() => showResult('Ничья!', '#ffd60a', '🤝'), 300); return; }
            tttTurn = tttTurn === 'x' ? 'o' : 'x'; setIsland(`Ход: ${tttTurn === 'x' ? '❌' : '⭕'}`, tttTurn === 'x' ? '#ff453a' : '#32ade6');
        }

        // --- КЛИКЕР ---
        let clicks=0, clickTimeSetting=15, clickTimeCurrent=0, clickInterval, clickActive=false;
        function changeClickTime(delta) {
            if (clickActive || appState.isPaused) return;
            clickTimeSetting += delta;
            if (clickTimeSetting < 5) clickTimeSetting = 5;
            if (clickTimeSetting > 100) clickTimeSetting = 100;
            clickTimeCurrent = clickTimeSetting; 
            document.getElementById('click-time-val').innerText = `${clickTimeSetting} сек`;
        }
        function initClicker() {
            clicks = 0; clickTimeCurrent = clickTimeSetting; clickActive = false; clearInterval(clickInterval);
            document.getElementById('click-score').innerText = 0;
            document.getElementById('click-time-val').innerText = `${clickTimeSetting} сек`;
            document.getElementById('clicker-controls').style.display = 'flex';
            setIsland(`Настрой время и ЖМИ!`, '#ffd60a');
        }
        function doClick() {
            if(appState.isPaused) return;
            if(!clickActive && clickTimeCurrent > 0) {
                clickActive = true;
                document.getElementById('clicker-controls').style.display = 'none';
                setIsland(`Время: ${clickTimeCurrent} сек`, '#ffd60a');
                clickInterval = setInterval(() => {
                    if(appState.isPaused) return;
                    clickTimeCurrent--; setIsland(`Время: ${clickTimeCurrent} сек`, '#ffd60a');
                    if(clickTimeCurrent <= 0) {
                        clearInterval(clickInterval); clickActive = false;
                        // Можно добавить выдачу монет за игру в кликер здесь!
                        let reward = Math.floor(clicks / 10); // Например, 1 монета за 10 кликов
                        addCoins(reward);
                        showResult(`Счет: ${clicks}\n+${reward} 🪙`, '#ff9f0a', '⏱️');
                    }
                }, 1000);
            }
            if(clickActive) {
                clicks++; document.getElementById('click-score').innerText = clicks;
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // --- ПОИСК ПРЕДМЕТОВ ---
        const ALL_ITEMS = ['🍎', '🔑', '💎', '👑', '🧸', '🍔', '🎸', '⚽', '📱', '🕶️', '🍉', '🦴'];
        const DECORS = ['🌲', '☁️', '🍄', '🌿', '🍂', '🌻', '🪵'];
        let hiddenFound = 0;
        let isFlashing = false;

        function initHiddenGame() {
            hiddenFound = 0;
            document.getElementById('hidden-found').innerText = '0';
            const scene = document.getElementById('hidden-scene');
            scene.innerHTML = '';
            scene.style.backgroundColor = '';

            for(let i=0; i<15; i++) {
                let d = document.createElement('div');
                d.className = 'scene-decor';
                d.innerText = DECORS[Math.floor(Math.random() * DECORS.length)];
                d.style.left = (10 + Math.random() * 80) + '%';
                d.style.top = (10 + Math.random() * 80) + '%';
                if (d.innerText === '☁️') d.style.top = (5 + Math.random() * 30) + '%';
                scene.appendChild(d);
            }

            let targets = [...ALL_ITEMS].sort(() => 0.5 - Math.random()).slice(0, 5);
            targets.forEach(emoji => {
                let item = document.createElement('div');
                item.className = 'hidden-item';
                item.innerText = emoji;
                item.style.left = (15 + Math.random() * 70) + '%';
                item.style.top = (15 + Math.random() * 70) + '%';
                
                item.onmousedown = (e) => hitHiddenItem(e, item);
                item.ontouchstart = (e) => { e.preventDefault(); hitHiddenItem(e, item); };
                
                scene.appendChild(item);
            });

            setIsland(`Найди 5 предметов!`, '#34c759');
        }

        function hitHiddenItem(e, el) {
            e.stopPropagation(); 
            if (appState.isPaused) return;
            
            tg.HapticFeedback.notificationOccurred('success');
            el.remove(); 
            hiddenFound++;
            addCoins(5);
            
            document.getElementById('hidden-found').innerText = hiddenFound;
            setIsland(`Найдено! +5 🪙`, '#34c759');
            
            if (hiddenFound >= 5) {
                setTimeout(() => showResult(`Уровень пройден!`, '#34c759', '🕵️‍♂️'), 500);
            }
        }

        function missHiddenClick(e) {
            if (appState.isPaused || isFlashing) return;
            
            tg.HapticFeedback.notificationOccurred('error');
            addCoins(-2);
            setIsland(`Мимо! -2 🪙`, '#ff453a');
            
            isFlashing = true;
            const scene = document.getElementById('hidden-scene');
            
            let oldBg = scene.style.background;
            scene.style.background = 'linear-gradient(to bottom, rgba(255,69,58,0.7) 0%, rgba(255,69,58,0.7) 100%), linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #8FBC8F 50%, #8FBC8F 100%)';
            
            setTimeout(() => {
                scene.style.background = oldBg;
                isFlashing = false;
            }, 200);
        }

    </script>
</body>
</html>
</body>
</html>
